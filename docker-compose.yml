services:
    postgres:
        image: "postgres:latest"
        
        ports:
            - "5432:5432"
            
        environment:
            - POSTGRES_USER=admin
            - POSTGRES_PASSWORD=password123
            - POSTGRES_DB=chat_database
        
        
    redis:
        image: "redis:latest"
        ports:
            - "6379:6379"
